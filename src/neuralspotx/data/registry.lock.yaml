# Starter profiles are DERIVED at load time from the family baselines and
# per-board channel below (see metadata._derive_starter_profiles). The
# board -> soc / sdk-provider mapping comes from the first-class board
# descriptors (src/neuralspotx/boards/<board>/board.yaml), so SoC and the
# provider module set are declared exactly once per family here instead of
# being duplicated for every board.
profile_defaults:
  toolchain: arm-none-eabi-gcc
  channel: stable
  # Common modules appended after the per-board board module for every profile.
  core_modules:
    - nsx-core
    - nsx-tooling

soc_families:
  r2:
    provider: nsx-ambiqsuite-r2
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite-r2
      - nsx-ambiq-hal-r2
      - nsx-ambiq-bsp-r2
      - nsx-soc-hal
      - nsx-cmsis-startup
    # Modules vendored from the unified nsx-ambiq-sdk monorepo for Apollo2.
    sdk_modules:
      - nsx-ambiqsuite-r2
      - nsx-ambiq-hal-r2
      - nsx-ambiq-bsp-r2
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
  r3:
    provider: nsx-ambiqsuite-r3
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite-r3
      - nsx-ambiq-hal-r3
      - nsx-ambiq-bsp-r3
      - nsx-soc-hal
      - nsx-cmsis-startup
    # Every module vendored by the unified nsx-ambiq-sdk monorepo. Listed
    # modules resolve to the unified source wherever an app uses them.
    sdk_modules:
      - nsx-ambiqsuite-r3
      - nsx-ambiq-hal-r3
      - nsx-ambiq-bsp-r3
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
      - nsx-audio
      - nsx-gpio
      - nsx-i2c
      - nsx-interrupt
      - nsx-perf
      - nsx-spi
      - nsx-timer
      - nsx-uart
  r4:
