# Starter profiles are DERIVED at load time from the family baselines and
# per-board channel below (see metadata._derive_starter_profiles). The
# board -> soc / sdk-provider mapping comes from the first-class board
# descriptors (src/neuralspotx/boards/<board>/board.yaml), so SoC and the
# provider module set are declared exactly once per family here instead of
# being duplicated for every board.
profile_defaults:
  toolchain: arm-none-eabi-gcc
  channel: stable
  # Common modules appended after the per-board board module for every profile.
  core_modules:
    - nsx-cmsis-core
    - nsx-core
    - nsx-tooling

soc_families:
  apollo2: &fam_apollo2
    provider: nsx-ambiqsuite
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-startup
    # Modules vendored from the unified nsx-ambiq-sdk monorepo for Apollo2.
    sdk_modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
  apollo3: &fam_apollo3
    provider: nsx-ambiqsuite
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-startup
    # Every module vendored by the unified nsx-ambiq-sdk monorepo. Listed
    # modules resolve to the unified source wherever an app uses them.
    sdk_modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
      - nsx-audio
      - nsx-gpio
      - nsx-i2c
      - nsx-interrupt
      - nsx-perf
      - nsx-psram
      - nsx-spi
      - nsx-timer
      - nsx-uart
  apollo3p: *fam_apollo3
  apollo4l: &fam_apollo4
    provider: nsx-ambiqsuite
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-startup
    sdk_modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-ambiq-usb
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
      - nsx-audio
      - nsx-gpio
      - nsx-i2c
      - nsx-interrupt
      - nsx-perf
      - nsx-psram
      - nsx-spi
      - nsx-timer
      - nsx-uart
      - nsx-usb
  apollo4p: *fam_apollo4
  apollo5b: &fam_apollo5
    provider: nsx-ambiqsuite
    project: nsx-ambiq-sdk
    revision: main
    modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-soc-hal
      - nsx-cmsis-startup
    sdk_modules:
      - nsx-ambiqsuite
      - nsx-ambiq-hal
      - nsx-ambiq-bsp
      - nsx-ambiq-usb
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
      - nsx-audio
      - nsx-gpio
      - nsx-i2c
      - nsx-interrupt
      - nsx-perf
      - nsx-power
      - nsx-psram
      - nsx-spi
      - nsx-timer
      - nsx-uart
      - nsx-usb
    core_modules:
      - nsx-cmsis-core
      - nsx-core
      - nsx-pmu-armv8m
      - nsx-tooling
  apollo510: *fam_apollo5
  apollo510b: *fam_apollo5
