      - nsx-ambiq-hal-r4
      - nsx-ambiq-bsp-r4
      - nsx-soc-hal
      - nsx-cmsis-startup
    sdk_modules:
      - nsx-ambiqsuite-r4
      - nsx-ambiq-hal-r4
      - nsx-ambiq-bsp-r4
      - nsx-ambiq-usb-r4
      - nsx-soc-hal
      - nsx-cmsis-core
      - nsx-cmsis-startup
      - nsx-core
