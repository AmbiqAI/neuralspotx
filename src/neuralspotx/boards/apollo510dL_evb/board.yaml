# NSX board descriptor (schema_version 1).
#
# Source of truth for board -> SoC / SDK-provider derivation consumed by
# neuralspotx.constants via neuralspotx/board_descriptors.py. Keep in sync
# with board.cmake (NSX_CPU / NSX_ABI_FLAGS).
#
# This Apollo510L variant is registered in the built-in board catalog.
schema_version: 1
board:
  name: apollo510dL_evb
  tier: evb
  soc: apollo510L
  registered: true
sdk_provider: ambiqsuite
cpu:
  core: cortex-m55
  float_abi: hard
  abi: thumbv8.1m-fpv5-hard
toolchains:
  - arm-none-eabi-gcc
  - armclang
  - atfe
