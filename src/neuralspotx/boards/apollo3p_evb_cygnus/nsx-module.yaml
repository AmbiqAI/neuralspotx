schema_version: 1

module:
  name: nsx-board-apollo3p-evb-cygnus
  type: board
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_board_apollo3p_evb_cygnus
    targets:
      - nsx::board_apollo3p_evb_cygnus

depends:
  required:
    - nsx-ambiq-hal
    - nsx-ambiq-bsp
    - nsx-soc-hal
    - nsx-cmsis-startup
    - nsx-ambiqsuite
  optional: []

constraints:
  required_sdk_provider: nsx-ambiqsuite

compatibility:
  boards:
    - apollo3p_evb_cygnus
  socs:
    - apollo3p
  toolchains:
    - arm-none-eabi-gcc
    - armclang
    - atfe
