schema_version: 1

module:
  name: nsx-board-apollo3-evb
  type: board
  version: "0.1.0"

support:
  ambiqsuite: true
  zephyr: false

build:
  cmake:
    package: nsx_board_apollo3_evb
    targets:
      - nsx::board_apollo3_evb

depends:
  required:
    - nsx-ambiq-hal
    - nsx-ambiq-bsp
    - nsx-soc-hal
    - nsx-cmsis-startup
    - nsx-ambiqsuite
  optional: []

constraints:
  required_sdk_provider: nsx-ambiqsuite

compatibility:
  boards:
    - apollo3_evb
  socs:
    - apollo3
  toolchains:
    - arm-none-eabi-gcc
