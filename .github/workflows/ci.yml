name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------
  # Lint — runs once on Linux
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: uv sync --group lint

      - name: Run ruff
        run: uv run --group lint ruff check .

  # ---------------------------------------------------------------
  # Unit tests — run on all three platforms
  # ---------------------------------------------------------------
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run pytest (unit tests only)
        run: >-
          uv run --group test pytest tests/
          -q
          --ignore=tests/test_example_builds.py

  # ---------------------------------------------------------------
  # Example builds — cross-compile examples on all three platforms
  # Requires arm-none-eabi-gcc, cmake, and ninja.
  # ---------------------------------------------------------------
  example-builds:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -- Install cmake + ninja via pip (works on all platforms) --
      - name: Install cmake and ninja
        run: uv pip install --system cmake ninja

      # -- ARM GCC toolchain --
      - name: Install ARM GCC (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o arm-gcc.tar.xz \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz"
          sudo mkdir -p /opt/arm-gcc
          sudo tar -xf arm-gcc.tar.xz --strip-components=1 -C /opt/arm-gcc
          echo "/opt/arm-gcc/bin" >> "$GITHUB_PATH"

      - name: Install ARM GCC (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL -o arm-gcc.tar.xz \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-darwin-arm64-arm-none-eabi.tar.xz"
          sudo mkdir -p /opt/arm-gcc
          sudo tar -xf arm-gcc.tar.xz --strip-components=1 -C /opt/arm-gcc
          echo "/opt/arm-gcc/bin" >> "$GITHUB_PATH"

      - name: Install ARM GCC (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -fsSL -o arm-gcc.zip \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-mingw-w64-i686-arm-none-eabi.zip"
          7z x arm-gcc.zip -oC:/arm-gcc-tmp -y > /dev/null
          inner=$(find C:/arm-gcc-tmp -maxdepth 1 -mindepth 1 -type d | head -1)
          echo "Toolchain root: $inner"
          mv "$inner" C:/arm-gcc
          echo "C:/arm-gcc/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version

      - name: Install neuralspotx
        run: uv sync --group test

      - name: Run example build tests
        run: >-
          uv run --group test pytest tests/test_example_builds.py
          -q
          --timeout=600
