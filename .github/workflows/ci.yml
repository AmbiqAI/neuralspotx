name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------
  # Lint — runs once on Linux
  # ---------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: uv sync --group lint

      - name: Run ruff
        run: uv run --group lint ruff check .

  # ---------------------------------------------------------------
  # Unit tests — run on all three platforms
  # ---------------------------------------------------------------
  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: uv sync --group test

      - name: Run pytest (unit tests only)
        run: >-
          uv run --group test pytest tests/
          -q
          --ignore=tests/test_example_builds.py

  # ---------------------------------------------------------------
  # Example builds — cross-compile examples on all three platforms
  # Requires arm-none-eabi-gcc, cmake, and ninja.
  # ---------------------------------------------------------------
  example-builds:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -- Install cmake + ninja via pip (works on all platforms) --
      - name: Install cmake and ninja
        run: uv pip install --system cmake ninja

      # -- ARM GCC toolchain --
      - name: Install ARM GCC (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL -o arm-gcc.tar.xz \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-x86_64-arm-none-eabi.tar.xz"
          sudo mkdir -p /opt/arm-gcc
          sudo tar -xf arm-gcc.tar.xz --strip-components=1 -C /opt/arm-gcc
          echo "/opt/arm-gcc/bin" >> "$GITHUB_PATH"

      - name: Install ARM GCC (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL -o arm-gcc.tar.xz \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-darwin-arm64-arm-none-eabi.tar.xz"
          sudo mkdir -p /opt/arm-gcc
          sudo tar -xf arm-gcc.tar.xz --strip-components=1 -C /opt/arm-gcc
          echo "/opt/arm-gcc/bin" >> "$GITHUB_PATH"

      - name: Install ARM GCC (Windows)
        if: runner.os == 'Windows'
        run: |
          curl -fsSL -o arm-gcc.zip \
            "https://developer.arm.com/-/media/Files/downloads/gnu/14.2.rel1/binrel/arm-gnu-toolchain-14.2.rel1-mingw-w64-i686-arm-none-eabi.zip"
          7z x arm-gcc.zip -oC:/arm-gcc -y > /dev/null
          # Find the actual gcc binary — zip layout varies across releases
          gcc_bin=$(find C:/arm-gcc -name "arm-none-eabi-gcc.exe" -type f | head -1)
          gcc_dir=$(dirname "$gcc_bin")
          echo "Found gcc at: $gcc_bin"
          echo "$gcc_dir" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          arm-none-eabi-gcc --version
          cmake --version
          ninja --version

      - name: Install neuralspotx
        run: uv sync --group test

      - name: Run example build tests
        run: >-
          uv run --group test pytest tests/test_example_builds.py
          -q
          --timeout=600

  # ---------------------------------------------------------------
  # Example builds (armclang) — optional, Linux only.
  # Skipped unless the ARMCLANG_URL secret is configured on the repo
  # (a URL to a tarball containing the Arm Compiler for Embedded install).
  # Safe for forks and PRs without the secret: the `if` short-circuits.
  # ---------------------------------------------------------------
  example-builds-armclang:
    if: ${{ vars.ARMCLANG_URL != '' }}
    runs-on: ubuntu-latest
    env:
      NSX_TOOLCHAIN: armclang
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cmake and ninja
        run: uv pip install --system cmake ninja

      - name: Install armclang
        env:
          ARMCLANG_URL: ${{ vars.ARMCLANG_URL }}
        run: |
          curl -fsSL -o armclang.tgz "$ARMCLANG_URL"
          sudo mkdir -p /opt/armclang
          sudo tar -xf armclang.tgz --strip-components=1 -C /opt/armclang
          # Path layout is e.g. /opt/armclang/bin/armclang
          bin=$(find /opt/armclang -maxdepth 4 -name armclang -type f | head -1)
          echo "armclang at: $bin"
          echo "$(dirname "$bin")" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          armclang --version
          armlink --version || true
          cmake --version
          ninja --version

      - name: Install neuralspotx
        run: uv sync --group test

      - name: Run example build tests (armclang)
        env:
          NSX_TEST_TOOLCHAIN: armclang
        run: >-
          uv run --group test pytest tests/test_example_builds.py
          -q
          --timeout=600

  # ---------------------------------------------------------------
  # Lock integrity — verify each example's nsx.yml/nsx.lock/modules/
  # are mutually consistent. No firmware toolchain required; runs
  # only on Linux because the verification is content/network-based.
  # ---------------------------------------------------------------
  lock-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install neuralspotx
        run: uv sync --group test

      - name: Verify lock integrity for every example
        run: |
          fail=0
          for app in examples/*/; do
            [ -f "$app/nsx.yml" ] || continue
            [ -f "$app/nsx.lock" ] || continue
            echo "::group::$app"
            # `nsx sync` populates modules/ at the SHAs recorded in
            # nsx.lock (no constraint re-resolution needed since the
            # lock pins commits). `nsx lock --check` then verifies that
            # nsx.yml has not drifted from nsx.lock and that the freshly
            # vendored on-disk content matches each recorded content hash.
            if ! uv run --group test nsx sync --app-dir "$app"; then
              fail=1
            elif ! uv run --group test nsx lock --check --app-dir "$app"; then
              # Diagnostic: dump file listings + hashes of any packaged
              # board dirs so we can see what drifted.
              echo "--- DIAG: post-sync state of $app ---"
              find "$app/boards" -type f -exec ls -la {} \; 2>/dev/null || true
              uv run --group test python - <<PYEOF
          from pathlib import Path
          from neuralspotx.nsx_lock import hash_tree, read_lock
          app = Path("$app")
          lock = read_lock(app)
          print(f"--- DIAG: lock vs disk hashes for {app} ---")
          for name, entry in lock.modules.items():
              if entry.kind != "packaged":
                  continue
              vd = app / entry.vendored_at
              disk = hash_tree(vd) if vd.exists() else "(missing)"
              ok = "OK" if disk == entry.content_hash else "DIFF"
              print(f"  [{ok}] {name} at {entry.vendored_at}")
              print(f"        lock: {entry.content_hash}")
              print(f"        disk: {disk}")
              if disk != entry.content_hash and vd.exists():
                  for f in sorted(vd.rglob("*")):
                      if f.is_file():
                          print(f"          - {f.relative_to(vd)} ({f.stat().st_size} bytes)")
          PYEOF
              fail=1
            fi
            echo "::endgroup::"
          done
          exit "$fail"

      - name: Report outdated modules (informational)
        if: always()
        continue-on-error: true
        run: |
          for app in examples/*/; do
            [ -f "$app/nsx.lock" ] || continue
            echo "::group::outdated $app"
            uv run --group test nsx outdated --json --app-dir "$app" || true
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------
  # Gate — single required-check for branch protection
  # ---------------------------------------------------------------
  lint-and-test:
    if: always()
    needs: [lint, unit-tests, example-builds, lock-integrity]
    runs-on: ubuntu-latest
    steps:
      - name: Decide status
        run: |
          # Fail if any dependency was not successful.
          if [[ "${{ needs.lint.result }}" != "success" ]] ||
             [[ "${{ needs.unit-tests.result }}" != "success" ]] ||
             [[ "${{ needs.example-builds.result }}" != "success" ]] ||
             [[ "${{ needs.lock-integrity.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
