name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: uv build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # PyPI publish must stay in this workflow. PyPI trusted publishing does not
  # support calling out to a reusable workflow for the publish step.
  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}
    environment:
      name: pypi
      url: https://pypi.org/project/neuralspotx/

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (disabled placeholder)
        uses: pypa/gh-action-pypi-publish@release/v1
