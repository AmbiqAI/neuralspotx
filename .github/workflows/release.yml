name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild artifacts for
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.tag == '') }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # PRs opened by GITHUB_TOKEN do not trigger other workflows
      # (GitHub's recursion guard), so the required `lint-and-test`
      # status on the release PR would otherwise never report. The
      # `workflow_dispatch` event is explicitly exempted from that
      # guard, so we dispatch CI on the release-please branch here.
      # The CI run's check runs attach to the PR's head SHA and
      # satisfy branch protection.
      - name: Dispatch CI on the release-please PR branch
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          branch=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')
          echo "Dispatching CI on branch: $branch"
          gh workflow run ci.yml --ref "$branch" --repo "$GITHUB_REPOSITORY"

  build:
    runs-on: ubuntu-latest
    needs:
      - release-please
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.tag != '') || needs.release-please.outputs.release_created == 'true') }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

      - name: Validate manual tag input
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          if [[ "${{ inputs.tag }}" != v* && "${{ inputs.tag }}" != neuralspotx-v* ]]; then
            echo "Manual release rebuilds must target an existing release tag such as v0.6.3 or neuralspotx-v0.6.3."
            exit 1
          fi
          git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          tag = "${{ env.RELEASE_TAG }}"
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          legacy_tag = f"v{version}"
          component_tag = f"neuralspotx-v{version}"
          if tag not in {legacy_tag, component_tag}:
              raise SystemExit(
                f"Release tag {tag} does not match pyproject.toml version {version}."
              )
          print(f"Validated release tag {tag} against package version {version}.")
          PY

      - name: Build distributions
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Smoke test installed wheel assets
        run: |
          wheel=$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)
          if [[ -z "$wheel" ]]; then
            echo "No wheel found under dist/."
            exit 1
          fi

          smoke_venv="${RUNNER_TEMP}/nsx-wheel-smoke-venv"
          smoke_app="${RUNNER_TEMP}/nsx-wheel-smoke-app"
          smoke_module="${RUNNER_TEMP}/nsx-wheel-smoke-module"

          uv venv --python 3.11 "$smoke_venv"
          uv pip install --python "$smoke_venv/bin/python" "$wheel"

          "$smoke_venv/bin/nsx" create-app "$smoke_app" --no-bootstrap
          "$smoke_venv/bin/nsx" module init "$smoke_module" \
            --name nsx-wheel-smoke \
            --summary "Installed-wheel package-data smoke test."
          "$smoke_venv/bin/nsx" module validate "$smoke_module/nsx-module.yaml"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: ${{ always() && needs.build.result == 'success' }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*

  # PyPI publish must stay in this workflow. PyPI trusted publishing does not
  # support calling out to a reusable workflow for the publish step.
  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: ${{ always() && needs.build.result == 'success' }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  refresh-uv-lock:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - github-release
      - pypi-publish
    if: ${{ always() && needs.release-please.outputs.release_created == 'true' && needs.github-release.result == 'success' && needs.pypi-publish.result == 'success' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync uv.lock to package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          import tomllib
          from pathlib import Path

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          lock_path = Path("uv.lock")
          text = lock_path.read_text(encoding="utf-8")

          # Update only the editable neuralspotx package version. This keeps the
          # lockfile in sync with pyproject.toml without sweeping in unrelated
          # transitive dependency updates that a full `uv lock` would pull in.
          pattern = re.compile(
              r'(\[\[package\]\]\nname = "neuralspotx"\nversion = ")[^"]*(")'
          )
          if not pattern.search(text):
              raise SystemExit(
                  "Could not locate editable neuralspotx package block in uv.lock."
              )

          updated = pattern.sub(rf"\g<1>{version}\g<2>", text, count=1)
          lock_path.write_text(updated, encoding="utf-8")

          print(f"version={version}")
          PY

      - name: Create uv.lock refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-uv-lock
          delete-branch: true
          commit-message: "chore: refresh uv.lock after release"
          title: "chore: refresh uv.lock for neuralspotx v${{ steps.version.outputs.version }}"
          body: |
            Refresh `uv.lock` after the `neuralspotx` release workflow published v${{ steps.version.outputs.version }}.

            This keeps the editable package entry in `uv.lock` aligned with `pyproject.toml` after Release Please bumps the package version.

            Only the editable `neuralspotx` version line is changed; transitive
            dependency pins are left untouched.
          add-paths: |
            uv.lock

      # PRs opened by GITHUB_TOKEN do not trigger other workflows, so dispatch
      # CI explicitly on the created/updated lock-refresh branch.
      - name: Dispatch CI on uv.lock refresh PR branch
        if: ${{ steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.cpr.outputs.pull-request-branch }}"
          echo "Dispatching CI on branch: $branch"
          gh workflow run ci.yml --ref "$branch" --repo "$GITHUB_REPOSITORY"
