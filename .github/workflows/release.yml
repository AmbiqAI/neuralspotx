name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild artifacts for
        required: false
        type: string

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Validate manual tag input
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v ]]; then
            echo "Manual release rebuilds must target an existing v* tag."
            exit 1
          fi
          git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build distributions
        run: uv build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*

  # PyPI publish must stay in this workflow. PyPI trusted publishing does not
  # support calling out to a reusable workflow for the publish step.
  pypi-publish:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}
    environment:
      name: pypi
      url: https://pypi.org/project/neuralspotx/

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI (disabled placeholder)
        uses: pypa/gh-action-pypi-publish@release/v1
