name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild artifacts for
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.tag == '') }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr: ${{ steps.release.outputs.pr }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # PRs opened by GITHUB_TOKEN do not trigger other workflows
      # (GitHub's recursion guard), so the required `lint-and-test`
      # status on the release PR would otherwise never report. The
      # `workflow_dispatch` event is explicitly exempted from that
      # guard, so we dispatch CI on the release-please branch here.
      # The CI run's check runs attach to the PR's head SHA and
      # satisfy branch protection.
      - name: Dispatch CI on the release-please PR branch
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          branch=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')
          echo "Dispatching CI on branch: $branch"
          gh workflow run ci.yml --ref "$branch" --repo "$GITHUB_REPOSITORY"

  build:
    runs-on: ubuntu-latest
    needs:
      - release-please
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.tag != '') || needs.release-please.outputs.release_created == 'true') }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

      - name: Validate manual tag input
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          if [[ "${{ inputs.tag }}" != v* && "${{ inputs.tag }}" != neuralspotx-v* ]]; then
            echo "Manual release rebuilds must target an existing release tag such as v0.6.3 or neuralspotx-v0.6.3."
            exit 1
          fi
          git rev-parse "refs/tags/${{ inputs.tag }}" >/dev/null 2>&1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          tag = "${{ env.RELEASE_TAG }}"
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          legacy_tag = f"v{version}"
          component_tag = f"neuralspotx-v{version}"
          if tag not in {legacy_tag, component_tag}:
              raise SystemExit(
                f"Release tag {tag} does not match pyproject.toml version {version}."
              )
          print(f"Validated release tag {tag} against package version {version}.")
          PY

      - name: Build distributions
        run: uv build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  github-release:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: needs.build.result == 'success'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*

  # PyPI publish must stay in this workflow. PyPI trusted publishing does not
  # support calling out to a reusable workflow for the publish step.
  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - build
    if: needs.build.result == 'success'

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  refresh-uv-lock:
    runs-on: ubuntu-latest
    needs:
      - release-please
      - github-release
      - pypi-publish
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.github-release.result == 'success' && needs.pypi-publish.result == 'success' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh uv.lock
        run: uv lock

      - name: Verify uv.lock change is version-only
        run: |
          python - <<'PY'
          import copy
          import subprocess
          import tomllib
          from pathlib import Path

          previous = subprocess.run(
              ["git", "show", "HEAD:uv.lock"],
              check=True,
              capture_output=True,
              text=True,
          ).stdout
          current = Path("uv.lock").read_text(encoding="utf-8")

          if previous == current:
              raise SystemExit(0)

          previous_data = tomllib.loads(previous)
          current_data = tomllib.loads(current)

          def find_local_package(data):
              for package in data["package"]:
                  if package.get("name") == "neuralspotx" and package.get("source") == {"editable": "."}:
                      return package
              raise SystemExit("Could not locate editable neuralspotx package block in uv.lock.")

          previous_package = find_local_package(previous_data)
          current_package = find_local_package(current_data)
          previous_version = previous_package.get("version")
          current_version = current_package.get("version")

          if previous_version == current_version:
              raise SystemExit("uv.lock changed without updating the editable neuralspotx version.")

          normalized_previous = copy.deepcopy(previous_data)
          normalized_current = copy.deepcopy(current_data)
          find_local_package(normalized_previous)["version"] = "__NSX_VERSION__"
          find_local_package(normalized_current)["version"] = "__NSX_VERSION__"

          if normalized_previous != normalized_current:
              raise SystemExit(
                  "uv.lock refresh changed more than the editable neuralspotx version; skipping auto PR."
              )
          PY

      - name: Read package version
        id: version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(f"version={data['project']['version']}")
          PY

      - name: Create uv.lock refresh PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/update-uv-lock
          delete-branch: true
          commit-message: "chore: refresh uv.lock after release"
          title: "chore: refresh uv.lock for neuralspotx v${{ steps.version.outputs.version }}"
          body: |
            Refresh `uv.lock` after the `neuralspotx` release workflow published v${{ steps.version.outputs.version }}.

            This keeps the editable package entry in `uv.lock` aligned with `pyproject.toml` after Release Please bumps the package version.

            The workflow only opens this PR when the lockfile diff is limited to the editable `neuralspotx` version line.
          add-paths: |
            uv.lock

      # PRs opened by GITHUB_TOKEN do not trigger other workflows, so dispatch
      # CI explicitly on the created/updated lock-refresh branch.
      - name: Dispatch CI on uv.lock refresh PR branch
        if: ${{ steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ steps.cpr.outputs.pull-request-branch }}"
          echo "Dispatching CI on branch: $branch"
          gh workflow run ci.yml --ref "$branch" --repo "$GITHUB_REPOSITORY"
