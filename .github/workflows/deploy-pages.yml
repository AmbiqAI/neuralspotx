name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  validate-ref:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy ref
        run: |
          if [[ "${{ github.ref_type }}" != "branch" || "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]]; then
            echo "GitHub Pages deploys must run from the default branch."
            echo "Current ref: type=${{ github.ref_type }} name=${{ github.ref_name }}"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    needs: validate-ref

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install and Build
        env:
          CI: ""
          PUBLIC_URL: "${{ steps.pages.outputs.base_url }}/"
        run: |
          uv sync --only-group docs
          uv run --group docs zensical build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
