schema_version: 1
project:
  name: usb_serial
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
    - apollo510b_evb
toolchain: arm-none-eabi-gcc
channel: stable
# Additive modules layered on every target's board profile. The TinyUSB
# serial stack (and its timer/interrupt dependencies) is not part of the
# lean <board>_minimal profile, so the app pulls it in here. These layer on
# top of whichever board profile the active target resolves to, so the same
# manifest serves both apollo510_evb and apollo510b_evb.
requires:
  - nsx-ambiq-usb
  - nsx-usb
  - nsx-timer
  - nsx-interrupt
features: {}
