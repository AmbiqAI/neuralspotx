schema_version: 1
project:
  name: audio_capture
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
    - apollo510b_evb
    - apollo330mP_evb
    - apollo510dL_evb
toolchain: arm-none-eabi-gcc
channel: stable
requires:
  - name: nsx-audio
    project: nsx-ambiq-sdk
    revision: main
features: {}
module_registry:
  projects:
    nsx-ambiq-sdk:
      url: https://github.com/AmbiqAI/nsx-ambiq-sdk.git
      revision: main
  modules:
    nsx-audio:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-audio/nsx-module.yaml
