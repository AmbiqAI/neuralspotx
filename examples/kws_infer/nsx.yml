schema_version: 2
project:
  name: kws_infer
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
    - apollo510b_evb
    - apollo330mP_evb
toolchain: arm-none-eabi-gcc
channel: stable
modules:
  - nsx-power
  - nsx-pmu-armv8m
  - nsx-helia-rt
features: {}
module_registry:
  projects:
    nsx-pmu-armv8m:
      url: https://github.com/AmbiqAI/nsx-pmu-armv8m.git
      revision: main
    helia-rt:
      url: https://github.com/AmbiqAI/helia-rt.git
      revision: helia-rt-v1.16.0
  modules:
    nsx-pmu-armv8m:
      project: nsx-pmu-armv8m
      revision: main
      metadata: modules/nsx-pmu-armv8m/nsx-module.yaml
    nsx-helia-rt:
      project: helia-rt
      revision: helia-rt-v1.16.0
      metadata: modules/helia-rt/nsx/nsx-module.yaml
