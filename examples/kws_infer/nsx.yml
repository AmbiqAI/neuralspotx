schema_version: 1
project:
  name: kws_infer
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
toolchain: arm-none-eabi-gcc
channel: stable
requires:
  - name: nsx-power
    project: nsx-ambiq-sdk
    revision: main
  - name: nsx-pmu-armv8m
    project: nsx-pmu-armv8m
    revision: main
  - name: nsx-helia-rt
    project: helia-rt
    revision: helia-rt-v1.16.0
features: {}
module_registry:
  projects:
    nsx-ambiq-sdk:
      url: https://github.com/AmbiqAI/nsx-ambiq-sdk.git
      revision: main
    nsx-pmu-armv8m:
      url: https://github.com/AmbiqAI/nsx-pmu-armv8m.git
      revision: main
    helia-rt:
      url: https://github.com/AmbiqAI/helia-rt.git
      revision: helia-rt-v1.16.0
  modules:
    nsx-power:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-power/nsx-module.yaml
    nsx-pmu-armv8m:
      project: nsx-pmu-armv8m
      revision: main
      metadata: modules/nsx-pmu-armv8m/nsx-module.yaml
    nsx-helia-rt:
      project: helia-rt
      revision: helia-rt-v1.16.0
      metadata: modules/helia-rt/nsx/nsx-module.yaml
