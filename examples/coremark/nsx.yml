schema_version: 1
project:
  name: coremark
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
    - apollo510b_evb
    - apollo4p_blue_kxr_evb
toolchain: arm-none-eabi-gcc
channel: stable
requires:
  - name: nsx-interrupt
    project: nsx-ambiq-sdk
    revision: main
  - name: nsx-timer
    project: nsx-ambiq-sdk
    revision: main
features: {}
module_registry:
  projects:
    nsx-ambiq-sdk:
      url: https://github.com/AmbiqAI/nsx-ambiq-sdk.git
      revision: main
  modules:
    nsx-interrupt:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-interrupt/nsx-module.yaml
    nsx-timer:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-timer/nsx-module.yaml
