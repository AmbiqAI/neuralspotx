schema_version: 1
project:
  name: power_benchmark
targets:
  default: apollo510_evb
  supported:
    - apollo510_evb
    - apollo510b_evb
toolchain: arm-none-eabi-gcc
channel: stable
# Additive modules layered on every target's board profile. The lean
# <board>_minimal profile already provides the SoC/board/core/startup stack
# (nsx::board, nsx::runtime_core). The power benchmark additionally drives
# GPIO phase markers, a hardware timer, and the nsx-power sequencing helpers,
# so those are pulled in here. apollo510 and apollo510b share the same MCU
# memory map, so a single ITCM linker script and overlay cover both targets.
requires:
  - name: nsx-power
    project: nsx-ambiq-sdk
    revision: main
  - name: nsx-gpio
    project: nsx-ambiq-sdk
    revision: main
  - name: nsx-timer
    project: nsx-ambiq-sdk
    revision: main
  - name: nsx-interrupt
    project: nsx-ambiq-sdk
    revision: main
features: {}
module_registry:
  projects:
    nsx-ambiq-sdk:
      url: https://github.com/AmbiqAI/nsx-ambiq-sdk.git
      revision: main
  modules:
    nsx-power:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-power/nsx-module.yaml
    nsx-gpio:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-gpio/nsx-module.yaml
    nsx-timer:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-timer/nsx-module.yaml
    nsx-interrupt:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-interrupt/nsx-module.yaml
