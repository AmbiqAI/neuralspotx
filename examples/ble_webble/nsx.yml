schema_version: 2
project:
  name: ble_webble
targets:
  default: apollo4p_blue_kxr_evb
  supported:
    - apollo4p_blue_kxr_evb
    - apollo3p_evb
    - apollo510b_evb
toolchain: arm-none-eabi-gcc
channel: preview
modules:
  - nsx-freertos
  - nsx-cordio
  - nsx-ble
features: {}
module_registry:
  projects:
    nsx-ambiq-sdk:
      url: https://github.com/AmbiqAI/nsx-ambiq-sdk.git
      revision: main
  modules:
    nsx-freertos:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-freertos/nsx-module.yaml
    nsx-cordio:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-cordio/nsx-module.yaml
    nsx-ble:
      project: nsx-ambiq-sdk
      revision: main
      metadata: modules/nsx-ble/nsx-module.yaml
